[toolchain]
anchor_version = "0.30.1"
solana_version = "1.18.26"

[features]
resolution = true
skip-lint = false

[programs.localnet]
ghos = "EnKo8EbfJkani8UePTmAVPzdCZM8vMEYYkjTar4fwBPg"

[programs.devnet]
ghos = "EnKo8EbfJkani8UePTmAVPzdCZM8vMEYYkjTar4fwBPg"

[programs.mainnet]
ghos = "EnKo8EbfJkani8UePTmAVPzdCZM8vMEYYkjTar4fwBPg"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "Localnet"
wallet = "~/.config/solana/id.json"

[scripts]
test = "yarn run ts-mocha -p ./tsconfig.json -t 1000000 tests/**/*.ts"
lint = "yarn prettier --check tests sdk/src examples"
format = "yarn prettier --write tests sdk/src examples"

[test]
startup_wait = 5000
shutdown_wait = 2000

[test.validator]
url = "https://api.mainnet-beta.solana.com"

[[test.validator.clone]]
address = "TokenzQdBNbLqP5VEhdkAS6EPFLC1PHnBqCXEpPxuEb"

[[test.validator.clone]]
address = "ZkTokenProof1111111111111111111111111111111"
